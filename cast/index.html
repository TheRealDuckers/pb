<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cast Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="cast.css">
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header id="topBar">
    <h1 id="pbName">Loading...</h1>
    <select id="pbSelect"></select>
  </header>

  <!-- TAG FILTER BAR -->
  <div id="tagFilterBar">
    <div id="tagFilterScroll">
      <div class="tagFilterPill active" data-tag="All">All</div>
      <!-- dynamic tags inserted here -->
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main id="mainContent">

    <!-- ANNOUNCEMENTS -->
    <section id="announcementsSection" class="pageSection">
      <h2>Announcements</h2>
      <div id="announcementList"></div>
    </section>

    <!-- SCHEDULE -->
    <section id="scheduleSection" class="pageSection hidden">
      <h2>Rehearsals</h2>
      <div id="scheduleList"></div>
    </section>

    <!-- MEDIA -->
    <section id="mediaSection" class="pageSection hidden">
      <h2>Media</h2>
      <div id="mediaList"></div>
    </section>

    <!-- PROFILE -->
    <section id="profileSection" class="pageSection hidden">
      <h2>Your Profile</h2>

      <div id="profileCard">
        <p><strong>Email:</strong> <span id="profileEmail"></span></p>
        <p><strong>PracticeBase:</strong> <span id="profilePB"></span></p>
      </div>

      <button id="logoutBtn" class="danger">Log Out</button>
    </section>

  </main>

  <!-- BOTTOM NAV -->
  <nav id="bottomNav">
    <div class="navItem active" data-target="announcementsSection">
      <span>Announcements</span>
    </div>
    <div class="navItem" data-target="scheduleSection">
      <span>Schedule</span>
    </div>
    <div class="navItem" data-target="mediaSection">
      <span>Media</span>
    </div>
    <div class="navItem" data-target="profileSection">
      <span>Profile</span>
    </div>
  </nav>

</div>

<script type="module" src="cast.js"></script>
</body>
</html>
