<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- MOBILE TOP BAR -->
<div id="topBar">
  <button id="menuBtn">☰</button>
  <h1>Admin</h1>
</div>

<!-- SLIDE‑OUT SIDEBAR -->
<div id="sidebarOverlay"></div>
<div id="sidebar">
  <div class="sidebarItem active" data-target="announcementsSection">Announcements</div>
  <div class="sidebarItem" data-target="scheduleSection">Rehearsals</div>
  <div class="sidebarItem" data-target="usersSection">Users</div>
  <div class="sidebarItem" data-target="tagsSection">Tags</div>
  <div class="sidebarItem" data-target="foldersSection">Media Folders</div>
  <div class="sidebarItem" data-target="mediaSection">Media</div>
  <div class="sidebarItem" data-target="settingsSection">Settings</div>
</div>

<!-- MAIN CONTENT -->
<div id="adminMain">

  <!-- PB SELECTOR -->
  <section class="section">
    <h2>Select PracticeBase</h2>
    <select id="pbSelect"></select>
  </section>

  <!-- ANNOUNCEMENTS -->
  <section id="announcementsSection" class="section">
    <h2>Announcements</h2>

    <div class="formRow">
      <input type="text" id="announcementTitle" placeholder="Title">
    </div>

    <div class="formRow">
      <textarea id="announcementBody" placeholder="Announcement text"></textarea>
    </div>

    <div class="formRow">
      <label>Tags:</label>
      <div id="announcementTagSelector" class="tagCheckboxContainer"></div>
    </div>

    <button id="addAnnouncementBtn">Post Announcement</button>

    <h3>Existing Announcements</h3>
    <div id="announcementList"></div>
  </section>

  <!-- SCHEDULE -->
  <section id="scheduleSection" class="section hidden">
    <h2>Rehearsals</h2>

    <div class="formRow">
      <input type="datetime-local" id="scheduleDate">
    </div>

    <div class="formRow">
      <input type="text" id="scheduleLocation" placeholder="Location">
    </div>

    <div class="formRow">
      <textarea id="scheduleNotes" placeholder="Notes"></textarea>
    </div>

    <div class="formRow">
      <label>Tags:</label>
      <div id="scheduleTagSelector" class="tagCheckboxContainer"></div>
    </div>

    <button id="addScheduleBtn">Add Rehearsal</button>

    <h3>Existing Rehearsals</h3>
    <div id="scheduleList"></div>
  </section>

  <!-- USERS -->
  <section id="usersSection" class="section hidden">
    <h2>Users</h2>
    <div id="userList"></div>
  </section>

  <!-- TAGS -->
  <section id="tagsSection" class="section hidden">
    <h2>Tags</h2>

    <div id="tagList" class="pillContainer"></div>

    <div class="formRow">
      <input type="text" id="newTagName" placeholder="New tag name">
      <input type="color" id="newTagColor" value="#ff66aa">
      <button id="addTagBtn">Add Tag</button>
    </div>
  </section>

  <!-- MEDIA FOLDERS -->
  <section id="foldersSection" class="section hidden">
    <h2>Media Folders</h2>

    <div id="folderList" class="folderContainer"></div>

    <div class="formRow">
      <input type="text" id="newFolderName" placeholder="New folder name">
      <button id="addFolderBtn">Add Folder</button>
    </div>
  </section>

  <!-- MEDIA -->
  <section id="mediaSection" class="section hidden">
    <h2>Add Media Link</h2>

    <div class="formRow">
      <input type="text" id="mediaName" placeholder="Media name">
    </div>

    <div class="formRow">
      <input type="text" id="mediaURL" placeholder="https://...">
    </div>

    <div class="formRow">
      <label>Folder:</label>
      <select id="mediaFolderSelect"></select>
    </div>

    <div class="formRow">
      <label>Tags:</label>
      <div id="mediaTagSelector" class="tagCheckboxContainer"></div>
    </div>

    <button id="addMediaBtn">Add Media</button>

    <h3>Existing Media</h3>
    <div id="mediaList"></div>
  </section>

  <!-- SETTINGS -->
  <section id="settingsSection" class="section hidden">
    <h2>Settings</h2>
    <button id="deletePBBtn" class="danger">Delete Entire PracticeBase</button>
  </section>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
